<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Expense Tracker</h1>

  <!-- Green success toast -->
  <div id="successToast" class="success-toast hidden">
    ✅ Expense added successfully!
  </div>

  <div class="add-expense-wrapper">
    <button class="dropdown-btn" id="addExpenseBtn" onclick="toggleAddExpense()">
      + Add Expense
    </button>

    <div id="expenseFormContainer" class="hidden">
      <form id="expenseForm">

        <input type="number" id="amount" placeholder="Amount" required>

        <select id="person" required>
          <option value="">Select Tag</option>
          <option value="Main">Main</option>
          <option value="Self">Self</option>
        </select>

        <select id="category" required>
          <option value="">Category</option>
          <option>Food</option>
          <option>Travel</option>
          <option>Shopping</option>
          <option>Bills</option>
          <option>Entertainment</option>
          <option>Other</option>
        </select>

        <input type="date" id="date" placeholder="DD/MM/YYYY" required>

        <input type="text" id="note" placeholder="Note">

        <button type="submit">Save Expense</button>

      </form>
    </div>
  </div>

  <div id="monthlyContainer"></div>

</div>

<!-- Salary Modal -->
<div id="salaryModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3>Add Salary for <span id="modalMonthLabel"></span></h3>
    <input type="number" id="salaryInput" placeholder="Enter salary amount">
    <div class="modal-buttons">
      <button onclick="saveSalary()" class="save-salary-btn">Save</button>
      <button onclick="closeSalaryModal()" class="cancel-salary-btn">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
